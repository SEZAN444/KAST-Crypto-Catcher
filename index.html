<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>KAST Crypto Catcher</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0b;
    --dark: #111114;
    --silver: #c8c8d0;
    --silver-light: #e8e8f0;
    --gold: #d4af6a;
    --gold-light: #f0cc88;
    --red: #ff4455;
    --green: #00e88a;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: var(--black);
    font-family: 'Syne', sans-serif;
    color: var(--silver-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(212,175,106,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 90%, rgba(68,136,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
    height: 100%;
    padding: 0 12px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 0 6px;
    flex-shrink: 0;
  }

  .kast-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1rem, 4vw, 1.4rem);
    letter-spacing: 0.12em;
    color: var(--silver-light);
  }
  .kast-logo span { color: var(--gold); }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.45rem, 1.8vw, 0.6rem);
    color: var(--silver);
    opacity: 0.6;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .score-panel { display: flex; gap: 14px; }
  .score-box { text-align: right; }
  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.45rem, 1.6vw, 0.55rem);
    color: var(--silver); opacity: 0.5;
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  .score-val {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.9rem, 3.5vw, 1.1rem);
    font-weight: 500; color: var(--gold-light);
  }

  /* CANVAS WRAPPER — fills available space */
  #canvas-wrap {
    position: relative;
    width: 100%;
    flex: 1;
    border: 1px solid rgba(200,200,208,0.1);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(212,175,106,0.08), 0 24px 60px rgba(0,0,0,0.6);
    background: var(--dark);
    min-height: 0;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  /* OVERLAYS */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,11,0.92);
    backdrop-filter: blur(6px);
    z-index: 10;
    gap: 14px;
    text-align: center;
    padding: 24px 20px;
  }
  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(1.6rem, 7vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  .overlay-title .accent { color: var(--gold); }

  .overlay-sub {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.6rem, 2.2vw, 0.72rem);
    color: var(--silver); opacity: 0.6;
    letter-spacing: 0.12em;
    max-width: 260px;
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 7px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 12px 18px;
    width: 100%;
    max-width: 280px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.6rem, 2.2vw, 0.7rem);
    color: var(--silver);
  }
  .legend-icon {
    width: 26px; height: 26px; border-radius: 50%;
    flex-shrink: 0; object-fit: cover;
    box-shadow: 0 0 6px rgba(255,255,255,0.15);
  }
  .legend-icon-scam {
    width: 26px; height: 26px; border-radius: 50%;
    flex-shrink: 0; background: #ff4455;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; font-weight: bold;
    box-shadow: 0 0 6px rgba(255,68,85,0.5);
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: clamp(0.75rem, 3vw, 0.85rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: clamp(11px, 3vw, 14px) clamp(28px, 8vw, 40px);
    border-radius: 8px;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    color: #111;
    box-shadow: 0 4px 20px rgba(212,175,106,0.35);
  }
  .btn-primary:active { transform: scale(0.97); }

  .final-score {
    font-family: 'DM Mono', monospace;
    font-size: clamp(2.2rem, 9vw, 3rem);
    font-weight: 500; color: var(--gold-light); line-height: 1;
  }
  .final-label {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.5rem, 2vw, 0.6rem);
    letter-spacing: 0.25em; color: var(--silver); opacity: 0.45;
    text-transform: uppercase; margin-top: -8px;
  }

  /* HUD */
  #hud {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0 8px;
    flex-shrink: 0;
  }
  .lives { display: flex; gap: 5px; }
  .heart { font-size: clamp(0.85rem, 3.5vw, 1rem); transition: opacity 0.3s; }
  .heart.dead { opacity: 0.15; }
  .level-badge {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.55rem, 2vw, 0.65rem);
    letter-spacing: 0.18em; color: var(--gold);
    background: rgba(212,175,106,0.1);
    border: 1px solid rgba(212,175,106,0.2);
    border-radius: 20px; padding: 4px 10px;
  }
  .combo-label {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.55rem, 2vw, 0.65rem);
    letter-spacing: 0.12em; color: var(--green);
    opacity: 0; transition: opacity 0.3s; min-width: 70px; text-align: right;
  }
  .combo-label.active { opacity: 1; }

  /* Touch hint */
  #touch-hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: rgba(200,200,210,0.35);
    text-transform: uppercase;
    pointer-events: none;
    animation: fadeHint 3s ease forwards;
    white-space: nowrap;
  }
  @keyframes fadeHint {
    0%   { opacity: 1; }
    60%  { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>

// ── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const rect = wrap.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width  = W;
  canvas.height = H;
}

window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// ── REFS ────────────────────────────────────────────────────────────────────
const scoreDisplay    = document.getElementById('score-display');
const bestDisplay     = document.getElementById('best-display');
const livesEl         = document.getElementById('lives');
const levelBadge      = document.getElementById('level-badge');
const comboLabel      = document.getElementById('combo-label');
const startOverlay    = document.getElementById('start-overlay');
const gameoverOverlay = document.getElementById('gameover-overlay');
const finalScoreEl    = document.getElementById('final-score');
const gameoverMsg     = document.getElementById('gameover-msg');

// ── HELPERS ─────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ── KAST CARD DRAW ──────────────────────────────────────────────────────────
function drawKastCard(cx, cy, cw, ch) {
  ctx.save();
  ctx.translate(cx - cw/2, cy - ch/2);
  const r = cw * 0.07;
  // Shadow
  ctx.shadowColor = 'rgba(212,175,106,0.35)';
  ctx.shadowBlur = 18;
  // Body
  let grad = ctx.createLinearGradient(0, 0, cw, ch);
  grad.addColorStop(0, '#2e2e34');
  grad.addColorStop(0.5, '#1a1a1f');
  grad.addColorStop(1, '#0f0f13');
  ctx.fillStyle = grad;
  roundRect(ctx, 0, 0, cw, ch, r);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Shine
  let shine = ctx.createLinearGradient(0, 0, cw * 0.6, ch * 0.6);
  shine.addColorStop(0, 'rgba(255,255,255,0.09)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shine;
  roundRect(ctx, 0, 0, cw, ch, r);
  ctx.fill();
  // Border
  ctx.strokeStyle = 'rgba(200,200,210,0.2)';
  ctx.lineWidth = 1;
  roundRect(ctx, 0, 0, cw, ch, r);
  ctx.stroke();
  // KAST logo
  const fs = cw * 0.09;
  ctx.font = `800 ${fs}px Syne, sans-serif`;
  ctx.fillStyle = '#e8e8f0';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('KAST', cw * 0.08, ch * 0.1);
  // Chip
  const chipX = cw*0.08, chipY = ch*0.38, chipW = cw*0.2, chipH = ch*0.28;
  ctx.fillStyle = 'rgba(212,175,106,0.45)';
  roundRect(ctx, chipX, chipY, chipW, chipH, 3);
  ctx.fill();
  ctx.strokeStyle = 'rgba(212,175,106,0.7)';
  ctx.lineWidth = 0.8;
  roundRect(ctx, chipX, chipY, chipW, chipH, 3);
  ctx.stroke();
  // Chip lines
  ctx.strokeStyle = 'rgba(212,175,106,0.6)';
  ctx.lineWidth = 0.7;
  const chipMidX = chipX + chipW/2, chipMidY = chipY + chipH/2;
  ctx.beginPath(); ctx.moveTo(chipMidX, chipY); ctx.lineTo(chipMidX, chipY+chipH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(chipX, chipMidY); ctx.lineTo(chipX+chipW, chipMidY); ctx.stroke();
  // VISA
  ctx.font = `bold ${cw*0.08}px Georgia, serif`;
  ctx.fillStyle = '#c8c8d0';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('VISA', cw*0.94, ch*0.92);
  // Platinum
  ctx.font = `${cw*0.055}px DM Mono, monospace`;
  ctx.fillStyle = 'rgba(200,200,210,0.4)';
  ctx.fillText('PLATINUM', cw*0.94, ch*0.76);
  // Card dots
  ctx.fillStyle = 'rgba(200,200,210,0.3)';
  ctx.textAlign = 'left';
  for (let g=0; g<4; g++) {
    for (let d=0; d<(g===3?2:4); d++) {
      ctx.beginPath();
      ctx.arc(cw*0.08 + g*(cw*0.23) + d*(cw*0.05), ch*0.78, cw*0.013, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ── COIN TYPES ───────────────────────────────────────────────────────────────
const COIN_TYPES = [
  { label:'USDC', color:'#00e88a', dark:'#00a060', pts:10,  weight:32 },
  { label:'USDT', color:'#26cfb0', dark:'#0d8a70', pts:10,  weight:28 },
  { label:'SOL',  color:'#d4af6a', dark:'#9a7020', pts:20,  weight:14 },
  { label:'BTC',  color:'#f0a030', dark:'#a06010', pts:25,  weight:10 },
  { label:'ETH',  color:'#8ab4f8', dark:'#3a6abf', pts:25,  weight:10 },
  { label:'KAST', color:'#c8c8ff', dark:'#6040c0', pts:50,  weight:5  },
  { label:'SCAM', color:'#ff4455', dark:'#990020', pts:-1,  weight:11 },
];

function weightedCoin() {
  const total = COIN_TYPES.reduce((s,t) => s+t.weight, 0);
  let r = Math.random()*total;
  for (const t of COIN_TYPES) { r -= t.weight; if (r<=0) return t; }
  return COIN_TYPES[0];
}

// ── STATE ────────────────────────────────────────────────────────────────────
let state = 'idle';
let score=0, best=0, lives=4, level=1, combo=0, comboTimer=0;
let walletX=0, targetX=0;
let coins=[], particles=[], frame=0;
let spawnRate=90, coinSpeed=2.5, lastLevel=0;

// Card dimensions (responsive)
function cardDims() {
  const cw = Math.min(W * 0.46, 140);
  return { cw, ch: cw * 0.62 };
}

function walletY() { return H - cardDims().ch * 0.85; }

// ── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count=10, text=null) {
  for (let i=0; i<count; i++) {
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = 2 + Math.random()*3;
    particles.push({ x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, color, life:1, r:2+Math.random()*3 });
  }
  if (text) particles.push({ isText:true, text, x, y, vy:-2.5, life:1, color });
}

// ── SPAWN ─────────────────────────────────────────────────────────────────────
function spawnCoin() {
  const coinR = Math.min(W * 0.042, 18);
  const type = weightedCoin();
  coins.push({
    x: coinR + Math.random()*(W - 2*coinR),
    y: -coinR,
    r: coinR,
    vy: coinSpeed + Math.random()*1.2,
    vx: (Math.random()-0.5)*0.8,
    rot: 0, rotSpeed: (Math.random()-0.5)*0.06,
    wobble: Math.random()*Math.PI*2,
    type,
  });
}

// ── LIVES UI ──────────────────────────────────────────────────────────────────
function renderLives() {
  livesEl.innerHTML = '';
  for (let i=0; i<4; i++) {
    const h = document.createElement('div');
    h.className = 'heart' + (i >= lives ? ' dead' : '');
    h.textContent = '♥';
    livesEl.appendChild(h);
  }
}

// ── GAME CONTROL ──────────────────────────────────────────────────────────────
function startGame() {
  resizeCanvas();
  score=0; lives=4; level=1; combo=0; comboTimer=0;
  frame=0; lastLevel=0; coins=[]; particles=[];
  walletX = W/2; targetX = W/2;
  coinSpeed=2.5; spawnRate=90;
  scoreDisplay.textContent='0';
  levelBadge.textContent='LEVEL 1';
  comboLabel.classList.remove('active');
  renderLives();
  startOverlay.classList.add('hidden');
  gameoverOverlay.classList.add('hidden');
  state='playing';
  // Touch hint
  const old = document.getElementById('touch-hint');
  if (old) old.remove();
  const hint = document.createElement('div');
  hint.id='touch-hint'; hint.textContent='← SLIDE TO MOVE →';
  document.getElementById('canvas-wrap').appendChild(hint);
  setTimeout(() => { if(hint.parentNode) hint.parentNode.removeChild(hint); }, 3200);
}

function endGame() {
  state='dead';
  finalScoreEl.textContent=score;
  const msgs = [
    'Keep stacking — every KAST transaction earns you more.',
    'Stable coins win. KAST keeps it moving.',
    'Dodge the scams. Stack the gains. That\'s KAST.',
    `Level ${level} reached. Not bad for a crypto catcher!`,
    'The global money app. Powered by stablecoins.',
  ];
  gameoverMsg.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  gameoverOverlay.classList.remove('hidden');
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update() {
  if (state!=='playing') return;
  frame++;

  // Level
  level = 1 + Math.floor(score/200);
  if (level !== lastLevel) {
    lastLevel=level;
    coinSpeed = 2.5 + (level-1)*0.4;
    spawnRate = Math.max(32, 90 - (level-1)*8);
    levelBadge.textContent = `LEVEL ${level}`;
  }

  // Wallet smoothing
  walletX += (targetX - walletX) * 0.16;

  // Spawn
  if (frame % spawnRate === 0) spawnCoin();
  if (level >= 4 && frame % Math.floor(spawnRate*1.7) === 0) spawnCoin();

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer===0) { combo=0; comboLabel.classList.remove('active'); }
  }

  const { cw, ch } = cardDims();
  const wy = walletY();

  // Coins
  for (let i=coins.length-1; i>=0; i--) {
    const c = coins[i];
    c.wobble += 0.04;
    c.x += c.vx + Math.sin(c.wobble)*0.3;
    c.y += c.vy;
    c.rot += c.rotSpeed;

    // Bounce off left and right walls
    if (c.x - c.r < 0) { c.x = c.r; c.vx = Math.abs(c.vx) * 0.8; }
    if (c.x + c.r > W) { c.x = W - c.r; c.vx = -Math.abs(c.vx) * 0.8; }

    if (c.y - c.r > H) {
      coins.splice(i,1);
      if (c.type.label === 'SCAM') {
        // Scam coin escaped — no penalty, lucky!
      } else {
        // Missed a good coin — lose a life
        combo=0; comboTimer=0; comboLabel.classList.remove('active');
        lives=Math.max(0, lives-1); renderLives();
        spawnParticles(c.x, H - 20, '#ff4455', 10, '💔 MISSED!');
        if (lives===0) { endGame(); return; }
      }
      continue;
    }

    // Collision
    if (c.x > walletX-cw/2 && c.x < walletX+cw/2 && c.y+c.r > wy-ch/2 && c.y-c.r < wy+ch/2) {
      coins.splice(i,1);
      if (c.type.label==='SCAM') {
        lives=Math.max(0,lives-1); renderLives();
        spawnParticles(c.x, c.y, '#ff4455', 16, '💀 SCAM!');
        combo=0; comboTimer=0; comboLabel.classList.remove('active');
        if (lives===0) { endGame(); return; }
      } else {
        combo++; comboTimer=180;
        const mult = combo>=5 ? 3 : combo>=3 ? 2 : 1;
        const earned = c.type.pts * mult;
        score += earned;
        scoreDisplay.textContent=score;
        if (score>best) { best=score; bestDisplay.textContent=best; }
        const txt = mult>1 ? `+${earned} ×${mult}` : `+${earned}`;
        spawnParticles(c.x, c.y, c.type.color, 10, txt);
        if (combo>=3) { comboLabel.textContent=`${combo}× COMBO`; comboLabel.classList.add('active'); }
      }
    }
  }

  // Particles
  for (let i=particles.length-1; i>=0; i--) {
    const p=particles[i];
    p.life -= 0.024;
    if (p.life<=0) { particles.splice(i,1); continue; }
    if (!p.isText) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.vx*=0.97; }
    else p.y+=p.vy;
  }
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle='#111114';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=1;
  const gridSize = Math.min(W,H)/11;
  for (let x=0; x<W; x+=gridSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0; y<H; y+=gridSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Coins
  for (const c of coins) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);

    if (c.type.label === 'BTC' && btcImg.complete) {
      // Draw BTC as the real image, clipped to circle
      ctx.shadowColor = '#f0a030'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(btcImg, -c.r, -c.r, c.r*2, c.r*2);
      ctx.shadowBlur = 0;
    } else if (c.type.label === 'SOL' && solImg.complete) {
      // Draw SOL as the real image, clipped to circle
      ctx.shadowColor = '#9945ff'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(solImg, -c.r, -c.r, c.r*2, c.r*2);
      ctx.shadowBlur = 0;
    } else if ((c.type.label === 'USDT' || c.type.label === 'USDC') && usdtImg.complete) {
      // Draw USDT/USDC as the real image, clipped to circle
      ctx.shadowColor = '#26cfb0'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(usdtImg, -c.r, -c.r, c.r*2, c.r*2);
      ctx.shadowBlur = 0;
    } else if (c.type.label === 'KAST' && kastImg.complete) {
      // Draw KAST as the real image, clipped to circle
      ctx.shadowColor = '#d4af6a'; ctx.shadowBlur = 18;
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(kastImg, -c.r, -c.r, c.r*2, c.r*2);
      ctx.shadowBlur = 0;
    } else if (c.type.label === 'ETH' && ethImg.complete) {
      // Draw ETH as the real image, clipped to circle
      ctx.shadowColor = '#8ab4f8'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(ethImg, -c.r, -c.r, c.r*2, c.r*2);
      ctx.shadowBlur = 0;
    } else {
      // Draw all other coins as styled circles
      let grd = ctx.createRadialGradient(-c.r*0.3,-c.r*0.3,1,0,0,c.r);
      grd.addColorStop(0, c.type.color);
      grd.addColorStop(0.6, c.type.color);
      grd.addColorStop(1, c.type.dark);
      ctx.fillStyle=grd;
      ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
      ctx.shadowColor=c.type.color; ctx.shadowBlur=10;
      ctx.strokeStyle=c.type.color; ctx.lineWidth=1;
      ctx.stroke(); ctx.shadowBlur=0;
      // Label
      ctx.fillStyle='#fff';
      const fs = c.r * (c.type.label==='SCAM' ? 0.55 : 0.44);
      ctx.font=`bold ${fs}px DM Mono, monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(c.type.label==='SCAM'?'✕':c.type.label, 0, 0);
    }
    ctx.restore();
  }

  // Wallet
  if (state==='playing') {
    const { cw, ch } = cardDims();
    drawKastCard(walletX, walletY(), cw, ch);
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha=p.life;
    if (p.isText) {
      const fs = Math.max(11, W*0.032);
      ctx.font=`bold ${fs}px Syne, sans-serif`;
      ctx.fillStyle=p.color; ctx.textAlign='center';
      ctx.shadowColor=p.color; ctx.shadowBlur=8;
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillStyle=p.color;
      ctx.shadowColor=p.color; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // Floor glow
  ctx.fillStyle='rgba(212,175,106,0.03)';
  ctx.fillRect(0, H-16, W, 16);
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── INPUT — MOUSE & TOUCH ────────────────────────────────────────────────────
function getX(clientX) {
  const rect = canvas.getBoundingClientRect();
  const { cw } = cardDims();
  return Math.max(cw/2, Math.min(W - cw/2, (clientX - rect.left) * (W / rect.width)));
}

// Mouse
canvas.addEventListener('mousemove', e => {
  if (state==='playing') targetX = getX(e.clientX);
});

// Touch move — smooth drag
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state==='playing') targetX = getX(e.touches[0].clientX);
}, { passive: false });

// Touch start (also moves immediately on tap)
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state==='playing') targetX = getX(e.touches[0].clientX);
  else if (state==='idle' || state==='dead') {
    // tap on canvas also starts game
  }
}, { passive: false });

// Buttons
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Prevent page scroll / bounce on mobile
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ── BOOT ──────────────────────────────────────────────────────────────────────
renderLives();
loop();
</script>
</body>
</html>
